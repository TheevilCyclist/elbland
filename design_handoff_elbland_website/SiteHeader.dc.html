</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:110},&quot;desktop&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { open: false, w: 0 };
  componentDidMount() {
    if (this._el && typeof ResizeObserver !== 'undefined') {
      this._ro = new ResizeObserver((entries) => {
        const w = entries[0].contentRect.width;
        if (w && Math.abs(w - this.state.w) > 1) this.setState({ w });
      });
      this._ro.observe(this._el);
      this.setState({ w: this._el.getBoundingClientRect().width });
    }
  }
  componentWillUnmount() { if (this._ro) this._ro.disconnect(); }
  renderVals() {
    const measured = this.state.w;
    const desktop = measured > 0 ? measured >= 840 : (this.props.desktop !== false);
    const open = !desktop && this.state.open;
    return {
      rootRef: (el) => { if (el && !this._el) this._el = el; },
      desktop,
      mobileNav: !desktop,
      menuOpen: open,
      barsIcon: !desktop && !this.state.open,
      xIcon: open,
      toggle: () => this.setState((s) => ({ open: !s.open })),
    };
  }
}
</script>
